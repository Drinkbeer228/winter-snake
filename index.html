<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Snake Game</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="scoreDisplay">Счёт: 0</div>
  <div id="highScoreDisplay">Рекорд: 0</div>
  <div id="speedDisplay">Скорость: 1x</div>
  <button id="muteBtn" class="mute-button">🔊</button>
  <canvas id="gameCanvas"></canvas>
  
  <div id="pauseOverlay" class="hidden">
    <h2>ПАУЗА</h2>
    <p>Нажми Space для продолжения</p>
  </div>
  
  <div id="gameOverScreen" class="hidden">
    <h2>Game Over</h2>
    <p>Счёт: <span id="finalScore">0</span></p>
    <p>Рекорд: <span id="finalHighScore">0</span></p>
    <button id="restartBtn">Играть снова</button>
    <p class="hint">Нажми R или кнопку для рестарта</p>
  </div>
  
  <script type="module" src="js/main.js"></script>
</body>
</html>
