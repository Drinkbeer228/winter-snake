<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Snake Game</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="scoreDisplay" class="hidden">Счёт: 0</div>
  <div id="highScoreDisplay" class="hidden">Рекорд: 0</div>
  <div id="speedDisplay" class="hidden">Скорость: 1x</div>
  <button id="muteBtn" class="mute-button">🔊</button>
  <canvas id="gameCanvas" class="hidden"></canvas>
  
  <!-- Главное меню -->
  <div id="mainMenu">
    <h1>🐍 Winter Snake</h1>
    <div class="menu-content">
      <div class="difficulty-section">
        <label for="difficultySelect">Сложность:</label>
        <select id="difficultySelect">
          <option value="easy">Легко</option>
          <option value="normal" selected>Нормально</option>
          <option value="hard">Сложно</option>
        </select>
        <div class="volume-section">
          <label for="volumeSlider">🔊 Громкость:</label>
          <input type="range" id="volumeSlider" min="0" max="100" value="50">
          <span id="volumeValue">50</span>
        </div>
      </div>
      
      <button id="startBtn">Начать игру</button>
      
      <div class="menu-buttons">
        <button id="leaderboardBtn" class="secondary">🏆 Таблица лидеров</button>
        <button id="skinsBtn" class="secondary">🎨 Скины</button>
        <button id="dailyBtn" class="secondary">📅 Ежедневные</button>
        <button id="statsBtn" class="secondary">📊 Статистика</button>
      </div>
      
      <div class="high-score-section">
        <p>Лучший счёт: <span id="menuHighScore">0</span></p>
      </div>
    </div>
  </div>
  
  <!-- Модальные окна -->
  <!-- Таблица лидеров -->
  <div id="leaderboardModal" class="modal hidden">
    <h2>🏆 Таблица лидеров</h2>
    <div id="leaderboardList"></div>
    <button id="clearLeaderboardBtn" class="danger">Очистить</button>
    <button id="closeLeaderboardBtn" class="secondary">Закрыть</button>
  </div>
  
  <!-- Скины -->
  <div id="skinsModal" class="modal hidden">
    <h2>🎨 Скины</h2>
    <div id="skinsList"></div>
    <button id="closeSkinsBtn" class="secondary">Закрыть</button>
  </div>
  
  <!-- Ежедневные челленджи -->
  <div id="dailyModal" class="modal hidden">
    <h2>📅 Ежедневные задания</h2>
    <div id="dailyList"></div>
    <p id="dailyTimer"></p>
    <p id="dailyTotalReward"></p>
    <button id="closeDailyBtn" class="secondary">Закрыть</button>
  </div>
  
  <!-- Статистика -->
  <div id="statsModal" class="modal hidden">
    <h2>📊 Статистика игрока</h2>
    <div id="statsContent" class="stats-content"></div>
    <button id="resetStatsBtn" class="danger">Сбросить статистику</button>
    <button id="closeStatsBtn" class="secondary">Закрыть</button>
  </div>
  
  <!-- Экран смерти -->
  <div id="gameOverScreen" class="hidden">
    <h2>Game Over</h2>
    <p>Счёт: <span id="finalScore">0</span></p>
    <p>Рекорд: <span id="finalHighScore">0</span></p>
    <button id="restartBtn">Играть снова</button>
    <p class="hint">Нажми R или кнопку для рестарта</p>
  </div>
  
  <!-- Оверлей паузы -->
  <div id="pauseOverlay" class="hidden">
    <h2>ПАУЗА</h2>
    <p>Нажми Space или Esc для продолжения</p>
  </div>
  
  <script type="module" src="js/main.js"></script>
</body>
</html>
