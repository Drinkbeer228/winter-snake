<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Winter Snake</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: #0a140f;
      background-image: url('./assets/background.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: Arial, sans-serif;
      touch-action: none;
    }
    
    #gameContainer {
      position: relative;
      width: 100vw;
      height: 100vh;
      max-width: 800px;
      max-height: 600px;
      margin: 0 auto;
    }
    
    #gameCanvas {
      display: block;
      width: 100%;
      height: 100%;
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 8px;
    }
    
    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      display: flex;
      justify-content: space-between;
      color: #fff;
      font-size: 20px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
      pointer-events: none;
      z-index: 10;
    }
    
    #startScreen, #gameOverScreen {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #fff;
      z-index: 20;
    }
    
    #startScreen h1, #gameOverScreen h1 {
      font-size: 48px;
      margin-bottom: 20px;
    }
    
    #startScreen p, #gameOverScreen p {
      font-size: 18px;
      margin-bottom: 30px;
      text-align: center;
      max-width: 80%;
    }
    
    button {
      padding: 15px 40px;
      font-size: 20px;
      background: #4CAF50;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.1s;
    }
    
    button:hover { transform: scale(1.05); }
    button:active { transform: scale(0.95); }
    
    .hidden { display: none !important; }
    
    /* Мобильные кнопки управления - скрыты */
    #mobileControls {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: none; /* Всегда скрыты */
      grid-template-columns: repeat(3, 60px);
      grid-template-rows: repeat(2, 60px);
      gap: 10px;
      z-index: 15;
    }
    
    .control-btn {
      width: 60px;
      height: 60px;
      background: rgba(255,255,255,0.2);
      border: 2px solid rgba(255,255,255,0.4);
      border-radius: 50%;
      color: #fff;
      font-size: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    
    .control-btn:active {
      background: rgba(255,255,255,0.4);
    }
    
    .control-btn.up { grid-column: 2; grid-row: 1; }
    .control-btn.left { grid-column: 1; grid-row: 2; }
    .control-btn.down { grid-column: 2; grid-row: 2; }
    .control-btn.right { grid-column: 3; grid-row: 2; }
    
    @media (max-width: 768px) {
      #gameContainer {
        max-width: 432px;
        max-height: 768px;
      }
      /* Кнопки остаются скрытыми */
    }
  </style>
</head>
<body>
  <div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui">
      <span id="scoreDisplay">💊 0</span>
      <span id="speedDisplay">⚡ 1x</span>
    </div>
    
    <div id="startScreen">
      <h1>🐍 Winter Snake</h1>
      <p>Управление: стрелки или свайпы<br>Дави направление для ускорения!</p>
      <button id="startBtn">Начать игру</button>
    </div>
    
    <div id="gameOverScreen" class="hidden">
      <h1>💀 Game Over</h1>
      <p>Счёт: <span id="finalScore">0</span></p>
      <button id="restartBtn">Играть снова</button>
    </div>
    
    <div id="mobileControls">
      <div class="control-btn up" data-dir="up">⬆️</div>
      <div class="control-btn left" data-dir="left">⬅️</div>
      <div class="control-btn down" data-dir="down">⬇️</div>
      <div class="control-btn right" data-dir="right">➡️</div>
    </div>
  </div>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
